<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W MALL— Home</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>

<body>
    <div id="stars"></div>
</body>

<body>

    <header>
        <nav class="navbar">
            <h2 class="logo">W MALL</h2>

            <!-- Dark mode toggle -->
            <div class="toggle-container">
                <input type="checkbox" id="darkSwitch">
                <label for="darkSwitch">
            <button id="darkToggle" class="toggle-btn">🌙 Dark Mode</button>
             
        </label>
            </div>
        </nav>

        <div class="brand">
            <div class="logo">WM</div>
            <div>
                <div style="font-weight:800">W MALL</div>
                <div class="muted" style="font-size:13px">Quality groceries • Delivered fast</div>
            </div>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="categories.html">Categories</a>
            <a href="offers.html">Offers</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
            <a href="admin.html">Admin</a>
            <a href="cart.html">Cart</a>
            <a href="product.html" class="active">Product</a>
            <a href="checkout.html">Checkout</a>
            <a href="login.html">Login</a>
        </nav>

        <div class="search">
            <input id="homeSearch" placeholder="Search products, e.g. tomatoes">
            <button class="cta" onclick="gotoSearch()">Search</button>
        </div>




        <header class="hero card" style="margin:20px; text-align:center; padding:30px;">
            <h1>Our Products</h1>
            <p>Browse our fresh and quality items</p>
        </header>
        <main class="container">
            <div class="card" style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
                <div>
                    <img id="pdImg" src="Camera Roll/items/Apple.jpg" alt="product">
                </div>
                <div>
                    <h2 id="pdTitle">Product Name</h2>
                    <div class="muted" id="pdCat">Category</div>
                    <div style="margin-top:12px;font-weight:800;font-size:20px">GH¢4.99<span id="pdPrice">0</span></div>
                    <p id="pdDesc" class="muted" style="margin-top:12px">Product description here.</p>
                    <div style="margin-top:16px;display:flex;gap:10px;align-items:center">
                        <input id="qty" type="number" value="1" min="1" style="width:80px;padding:8px;border-radius:8px;border:1px solid #eef2f7">
                        <button class="cta" onclick="addFromDetail()">Add to cart</button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">© W MALL</footer>
</body>

</html>
